<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Features – Above The Record</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .iframe-wrap {
      width: 100%;
      height: calc(100vh - 112px);
      border: none;
      display: block;
    }
    .iframe-notice {
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      font-size: 12.5px;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .iframe-notice a {
      color: var(--gold);
      text-decoration: underline;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="iframe-notice">
    <span>Viewing external feature article</span>
    <a href="https://entertainmentpost.com/jazire-is-pushing-the-boundaries-of-the-seattle/">Open full article ↗</a>
  </div>
  <iframe
    class="iframe-wrap"
    src="https://entertainmentpost.com/jazire-is-pushing-the-boundaries-of-the-seattle/"
    title="Features – Entertainment Post"
    loading="lazy"
    sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
  ></iframe>
</div>
<script src="js/shared.js"></script>
</body>
</html>

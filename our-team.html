<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Team – Above The Record</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .our-team-area {
      background: #fff;
      min-height: 60vh;
      padding: 40px 32px 80px;
      text-align: center;
    }
    .announcement-link {
      font-family: Arial, sans-serif;
      font-size: 1.5em;
      color: #000;
      text-decoration: underline;
      transition: color 0.3s;
    }
    .announcement-link:hover {
      color: darkgray;
    }
    @media (max-width: 600px) {
      .our-team-area { padding: 28px 20px 60px; }
      .announcement-link { font-size: 1.1em; }
    }
  </style>
</head>
<body>
<div id="app">

  <div class="our-team-area">
    <a
      href="https://www.tacomaartslive.org/events/above-the-record/"
      class="announcement-link"
      target="_blank"
    >We're excited to announce our team and partners after our exclusive launch</a>
  </div>

</div>
<script src="js/shared.js"></script>
</body>
</html>
